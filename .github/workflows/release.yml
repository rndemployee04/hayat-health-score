name: Build and Release Plugin

on:
  push:
    tags:
      - "v*" # Trigger release when pushing a tag like v1.0.0
  pull_request:
    branches:
      - main # Trigger tests when making a PR to main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Remove Development Files
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Clean up unnecessary files before zipping
          rm -rf node_modules/
          rm -rf src/
          rm -rf .github/
          rm -f package.json package-lock.json
          rm -f composer.json composer.lock
          rm -f .gitignore

      - name: Build Plugin ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd ..
          mv hayat-health-score health-score
          zip -r health-score-${{ github.ref_name }}.zip health-score/ -x "*.git*"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ../health-score-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
